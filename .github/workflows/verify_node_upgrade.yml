name: Verify Node 24 Upgrade
on:
  workflow_dispatch:

jobs:
  verify-env:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Log Runtime Environment
        run: |
          echo "--- RUNTIME VERSIONS ---"
          node --version
          python --version
          echo "
--- ENVIRONMENT FLAGS ---"
          echo "Node 24 Force Flag: ${FORCE_JAVASCRIPT_ACTIONS_TO_NODE24}"
