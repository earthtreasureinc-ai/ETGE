name: Run ETGE Controller
on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'
  push:
    branches: [main]

jobs:
  run-controller:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests google-api-python-client google-auth-httplib2 google-auth-oauthlib python-dateutil
      - name: Run ETGE controller
        env:
          GITHUB_TOKEN: ${{ secrets.PAT_TOKEN }}
          GDRIVE_SERVICE_ACCOUNT_JSON: ${{ secrets.GDRIVE_SERVICE_ACCOUNT_JSON }}
          OWNER: ${{ secrets.OWNER }}
          REPO: ${{ secrets.REPO }}
        run: python etge_controller.py --archive-root "/tmp/etge_archive"