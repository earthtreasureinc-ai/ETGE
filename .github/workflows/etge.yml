
name: ETGE Workflow

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run ETGE Controller
        run: python etge_controller.py --archive-root "/tmp/etge_archive"

      - name: Upload ETGE Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: etge-research-bundle
          path: /tmp/etge_archive/
          retention-days: 5
